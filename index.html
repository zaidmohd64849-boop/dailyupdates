<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Update - Jobs, Admit Card, Results</title>

<meta name="description" content="Latest Government Jobs, Admit Cards, Results">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>DAILY UPDATE</h1>
  <p>Latest Jobs | Admit Card | Results</p>
</div>

<div class="menu">
  <a href="index.html">Home</a>
  <a href="admin.html">Admin</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy Policy</a>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchPost()">
</div>

<div class="container">

  <div class="box">
    <h2>Latest Jobs</h2>
    <ul id="jobsList"></ul>
  </div>

  <div class="box">
    <h2>Admit Card</h2>
    <ul id="admitList"></ul>
  </div>

  <div class="box">
    <h2>Results</h2>
    <ul id="resultList"></ul>
  </div>

  <div class="box">
    <h2>More Information</h2>
    <ul id="moreinformationList"></ul>
  </div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBSS9bPh6oXLKIzUHrhqjXzGXWz-2ecTU",
  authDomain: "daily-updates-f1147.firebaseapp.com",
  projectId: "daily-updates-f1147",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts(){

const querySnapshot = await getDocs(collection(db,"posts"));

// Clear lists
document.getElementById("jobsList").innerHTML = "";
document.getElementById("admitList").innerHTML = "";
document.getElementById("resultList").innerHTML = "";
document.getElementById("moreinformationList").innerHTML = "";

querySnapshot.forEach((doc)=>{
let data = doc.data();

let li = document.createElement("li");

li.innerHTML = `
<a href="${data.link}" target="_blank">${data.title}</a>
`;

// Category wise add
if(data.category === "jobs"){
document.getElementById("jobsList").appendChild(li);
}
else if(data.category === "admit"){
document.getElementById("admitList").appendChild(li);
}
else if(data.category === "result"){
document.getElementById("resultList").appendChild(li);
}
else{
document.getElementById("moreinformationList").appendChild(li);
}

});

}

loadPosts();

</script>
</body>
</html>
